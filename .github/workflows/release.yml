name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build release tarball
        run: bash scripts/build-release.sh

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Copy install.sh to dist
        run: cp scripts/install.sh dist/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/llamafleet-v${{ steps.version.outputs.VERSION }}.tar.gz
            dist/llamafleet-v${{ steps.version.outputs.VERSION }}.tar.gz.sha256
            dist/install.sh
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
