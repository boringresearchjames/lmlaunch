services:
  bridge:
    build:
      context: ./apps/host-bridge
      args:
        INSTALL_LMS: ${INSTALL_LMS:-true}
    container_name: lmlaunch-bridge
    environment:
      BRIDGE_PORT: 8090
      BRIDGE_AUTH_TOKEN: ${BRIDGE_AUTH_TOKEN:-}
      LOG_LINES_DEFAULT: 200
    expose:
      - "8090"
    volumes:
      - bridge_data:/data
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
    container_name: lmlaunch-api
    environment:
      PORT: 8081
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
      BRIDGE_URL: http://bridge:8090
      BRIDGE_AUTH_TOKEN: ${BRIDGE_AUTH_TOKEN:-}
      STATE_FILE: /data/state.json
    ports:
      - "8081:8081"
    volumes:
      - api_data:/data
    depends_on:
      - bridge
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    container_name: lmlaunch-web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  bridge_data:
  api_data:
